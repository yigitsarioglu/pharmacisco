<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
        width: 320px; 
        margin: 0; 
        padding: 0;
        font-family: 'Inter', sans-serif; 
        background: #f4f6F8;
        color: #333;
    }
    .header {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        padding: 20px 15px;
        text-align: center;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header h3 { 
        margin: 0 0 5px 0; 
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }
    .header p {
        margin: 0;
        font-size: 12px;
        opacity: 0.9;
    }
    .content {
        padding: 25px 20px;
        text-align: center;
    }
    .action-btn {
        width: 100%;
        padding: 14px;
        background: white;
        color: #059669;
        border: 2px solid #059669;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
        transition: all 0.2s ease;
        box-shadow: 0 2px 4px rgba(5, 150, 105, 0.1);
    }
    .action-btn:hover { 
        background-color: #059669; 
        color: white;
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(5, 150, 105, 0.2);
    }
    .action-btn:active {
        transform: translateY(1px);
    }
    .status-box {
        margin-top: 15px;
        font-size: 13px;
        min-height: 20px;
        padding: 10px;
        border-radius: 6px;
        font-weight: 600;
        display: none;
    }
    .status-box.success { 
        display: block;
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #10b981;
    }
    .status-box.error { 
        display: block;
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">
      <h3>Pharmacisco</h3>
      <p>Medula E-Reçete Aktarım Aracı</p>
  </div>
  <div class="content">
      <button id="btnScan" class="action-btn">E-Reçeteyi Aktar</button>
      <div id="status" class="status-box"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
